name: Deep Quality Lane

on:
  push:
    branches:
      - main
  schedule:
    - cron: '35 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: 22
  PNPM_VERSION: 10.28.2

jobs:
  deep-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: AI slop policy check
        run: pnpm ai:slop-check

      - name: Dead code check
        run: pnpm deadcode:check

      - name: Dependency graph hygiene check
        run: pnpm deps:graph:check

      - name: Dependency dedupe check
        run: pnpm deps:dedupe:check

      - name: Dependency audit (high severity and above)
        run: pnpm deps:audit

      - name: GitHub workflow lint (actionlint)
        uses: reviewdog/action-actionlint@0d952c597ef8459f634d7145b0b044a9699e5e43 # v1
        with:
          reporter: github-check
          filter_mode: nofilter
          fail_level: error

      - name: GitHub workflow security audit (zizmor)
        uses: zizmorcore/zizmor-action@0dce2577a4760a2749d8cfb7a84b7d5585ebcb7d # v0.5.0
        with:
          advanced-security: 'false'
          annotations: 'true'
          config: zizmor.yml
          inputs: .github/workflows/deploy.yml .github/workflows/deep-quality-lane.yml .github/workflows/dependabot-trigger.yml .github/workflows/dependency-health-nightly.yml
          persona: regular
          min-severity: medium
          min-confidence: medium

      - name: Setup Python for detect-secrets
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install detect-secrets
        run: |
          python -m pip install --upgrade pip
          python -m pip install detect-secrets==1.5.0

      - name: Detect secrets
        run: detect-secrets scan --baseline .secrets.baseline
