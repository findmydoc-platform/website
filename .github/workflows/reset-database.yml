name: Reset Database

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: 'Type RESET_PREVIEW_DB to confirm preview database reset'
        required: true
        type: string

permissions:
  contents: read

env:
  NODE_VERSION: 22
  PNPM_VERSION: 10.28.2
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  reset-preview-database:
    name: Reset Preview Database
    runs-on: ubuntu-latest
    environment: Preview

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Reset preview database with fresh migrations
        env:
          DATABASE_URI: ${{ secrets.DATABASE_URI }}
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
          RESET_CONFIRMATION: ${{ github.event.inputs.confirmation }}
        run: bash ./.github/scripts/ci/reset-preview-database.sh "$RESET_CONFIRMATION"
