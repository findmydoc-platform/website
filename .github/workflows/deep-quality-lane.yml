name: Deep Quality Lane

on:
  push:
    branches:
      - main
  schedule:
    - cron: '35 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: 22
  PNPM_VERSION: 10.28.2

jobs:
  deep-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: AI slop policy check
        run: pnpm ai:slop-check

      - name: Dead code check
        run: pnpm deadcode:check

      - name: Dependency graph hygiene check
        run: pnpm deps:graph:check

      - name: Dependency dedupe check
        run: pnpm deps:dedupe:check

      - name: Dependency audit (high severity and above)
        run: pnpm deps:audit

      - name: GitHub workflow lint (actionlint)
        uses: reviewdog/action-actionlint@v1
        with:
          reporter: github-check
          filter_mode: nofilter
          fail_level: error

      - name: GitHub workflow security audit (zizmor)
        uses: zizmorcore/zizmor-action@v0.5.0
        with:
          advanced-security: 'false'
          annotations: 'true'
          persona: regular
          min-severity: medium
          min-confidence: medium

      - name: Setup Python for detect-secrets
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install detect-secrets
        run: |
          python -m pip install --upgrade pip
          python -m pip install detect-secrets==1.5.0

      - name: Detect secrets
        run: detect-secrets scan --baseline .secrets.baseline
