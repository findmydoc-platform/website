name: Workflow Security

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
      - '.secrets.baseline'
      - 'zizmor.yml'
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
      - '.secrets.baseline'
      - 'zizmor.yml'
  schedule:
    - cron: '50 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 24.14.0
  PNPM_VERSION: 10.28.2

jobs:
  workflow-security:
    name: Workflow Security
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Determine zizmor inputs
        id: zizmor-inputs
        run: |
          set -euo pipefail

          default_inputs="$(git ls-files '.github/workflows/*.yml' '.github/workflows/*.yaml' '.github/actions/**' | tr '\n' ' ' | sed -E 's/[[:space:]]+$//')"
          inputs="$default_inputs"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff --name-only --diff-filter=ACMR origin/main...HEAD > changed-files.txt
            grep -E '^(\.github/workflows/.*\.(yml|yaml)|\.github/actions/.*)$' changed-files.txt > changed-workflow-security-targets.txt || true
            if [ -s changed-workflow-security-targets.txt ]; then
              inputs="$(tr '\n' ' ' < changed-workflow-security-targets.txt | sed -E 's/[[:space:]]+$//')"
            fi
          fi

          echo "inputs=${inputs}" >> "$GITHUB_OUTPUT"

      - name: GitHub workflow lint (actionlint)
        uses: reviewdog/action-actionlint@0d952c597ef8459f634d7145b0b044a9699e5e43 # v1.71.0
        with:
          reporter: github-check
          filter_mode: nofilter
          fail_level: error

      - name: GitHub workflow security audit (zizmor)
        uses: zizmorcore/zizmor-action@0dce2577a4760a2749d8cfb7a84b7d5585ebcb7d # v0.5.0
        with:
          advanced-security: 'false'
          annotations: 'true'
          config: zizmor.yml
          inputs: ${{ steps.zizmor-inputs.outputs.inputs }}
          persona: regular
          min-severity: medium
          min-confidence: medium

      - name: Setup Python for detect-secrets
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install detect-secrets
        run: |
          python -m pip install --upgrade pip
          python -m pip install detect-secrets==1.5.0

      - name: Detect secrets
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff --name-only --diff-filter=ACMR origin/main...HEAD > changed-files.txt
            grep -Ev '(^|/)pnpm-lock\.yaml$' changed-files.txt > changed-files-secret-scan.txt || true
            if [ -s changed-files-secret-scan.txt ]; then
              tr '\n' '\0' < changed-files-secret-scan.txt | xargs -0 detect-secrets-hook --baseline .secrets.baseline
            else
              echo "No changed files found for secret scan."
            fi
          else
            detect-secrets scan --baseline .secrets.baseline
          fi
