name: Docs Check

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  detect-docs-changes:
    name: detect docs changes
    runs-on: ubuntu-24.04
    outputs:
      docs_changed: ${{ steps.filter.outputs.docs }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Detect README/docs changes
        id: filter
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        with:
          filters: |
            docs:
              - 'README.md'
              - 'docs/**'

  docs-check:
    name: docs consistency
    needs: detect-docs-changes
    if: needs.detect-docs-changes.outputs.docs_changed == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24.14.0

      - name: Run docs consistency check
        run: pnpm docs:check

  docs-policy-gate:
    name: docs policy gate
    needs:
      - detect-docs-changes
      - docs-check
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: Enforce conditional docs check policy
        run: |
          if [ "${{ needs.detect-docs-changes.result }}" != "success" ]; then
            echo "Docs change detection did not complete successfully."
            exit 1
          fi

          if [ "${{ needs.detect-docs-changes.outputs.docs_changed }}" = "true" ] && [ "${{ needs.docs-check.result }}" != "success" ]; then
            echo "README/docs changed, but docs consistency check did not pass."
            exit 1
          fi

          echo "Docs policy satisfied."
