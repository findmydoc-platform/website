default_install_hook_types:
  - pre-commit
  - pre-push

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args:
          - --baseline
          - .secrets.baseline

  - repo: local
    hooks:
      - id: pnpm-check
        name: pnpm-check
        entry: pnpm check
        language: system
        pass_filenames: false
      - id: pnpm-format-check
        name: pnpm-format-check
        entry: pnpm format:check
        language: system
        pass_filenames: false
      - id: ai-slop-pre-push-check
        name: ai-slop-pre-push-check
        entry: pnpm ai:slop-check:prepush
        language: system
        pass_filenames: false
        stages:
          - pre-push
