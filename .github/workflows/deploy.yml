name: CI & CD

permissions:
  contents: read

# Prevent concurrent runs on the same PR or branch
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '!**/.github/workflows/**'
      - '**/.github/dependabot.yml'
      - '**/*.md'
      - '**/.vscode/settings.json'
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  NODE_VERSION: 24.14.0
  PNPM_VERSION: 10.28.2
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  PREVIEW_ALIAS_DOMAIN: preview.findmydoc.eu
  PRODUCTION_ALIAS_DOMAIN: findmydoc.eu
  NEXT_TELEMETRY_DISABLED: 1

defaults:
  run:
    shell: bash

jobs:
  paths:
    name: Path Filter
    runs-on: ubuntu-latest
    outputs:
      deployable: ${{ steps.set-path-outputs.outputs.deployable }}
      deep_quality: ${{ steps.set-path-outputs.outputs.deep_quality }}
      dependency_changes: ${{ steps.set-path-outputs.outputs.dependency_changes }}
      workflow_security: ${{ steps.set-path-outputs.outputs.workflow_security }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Detect deployable changes
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            deployable:
              - '**'
              - '!docs/**'
              - '!tests/**'
              - '!.storybook/**'
              - '!src/stories/**'
              - '!**/*.stories.{ts,tsx}'
              - '!**/*.md'
            deep_quality:
              - 'src/**'
              - 'tests/**'
              - 'scripts/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tsconfig*.json'
              - 'knip.jsonc'
              - '.dependency-cruiser.cjs'
            dependency_changes:
              - 'package.json'
              - 'pnpm-lock.yaml'
            workflow_security:
              - '.github/workflows/**'
              - '.github/actions/**'
              - '.secrets.baseline'
              - 'zizmor.yml'

      - name: Set path outputs
        id: set-path-outputs
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            {
              echo "deployable=true"
              echo "deep_quality=true"
              echo "dependency_changes=true"
              echo "workflow_security=true"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "deployable=${{ steps.filter.outputs.deployable }}"
              echo "deep_quality=${{ steps.filter.outputs.deep_quality }}"
              echo "dependency_changes=${{ steps.filter.outputs.dependency_changes }}"
              echo "workflow_security=${{ steps.filter.outputs.workflow_security }}"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Set deployable output
        id: set-deployable
        run: bash ./.github/scripts/ci/set-deployable-output.sh "${{ github.event_name }}" "${{ steps.filter.outputs.deployable }}"

  ci-static:
    name: Static Checks
    needs:
      - paths
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Check formatting
        run: pnpm format:check

      - name: Generate permission matrix JSON
        run: pnpm matrix:derive json

      - name: Verify permission matrix alignment
        run: pnpm matrix:verify

      - name: Check migrations
        run: bash ./.github/scripts/ci/check-migrations-diff.sh "origin/main" "HEAD"

      - name: Check payload types
        run: pnpm run check:payload-types

      - name: Dead code check
        if: ${{ github.event_name != 'pull_request' || needs.paths.outputs.deep_quality == 'true' }}
        run: pnpm deadcode:check

      - name: Dependency graph hygiene check
        if: ${{ github.event_name != 'pull_request' || needs.paths.outputs.deep_quality == 'true' }}
        run: pnpm deps:graph:check

      - name: Story governance check
        if: ${{ github.event_name != 'pull_request' || needs.paths.outputs.deep_quality == 'true' }}
        run: pnpm stories:governance:check

      - name: Dependency dedupe check
        id: dedupe
        continue-on-error: true
        if: ${{ github.event_name != 'pull_request' || needs.paths.outputs.dependency_changes == 'true' }}
        run: pnpm deps:dedupe:check

      - name: Warn about dependency dedupe drift
        if: ${{ steps.dedupe.outcome == 'failure' }}
        run: |
          echo "::warning::Dependency dedupe drift detected. The scheduled dependency dedupe autofix workflow will clean this up."

      - name: Dependency audit (high severity and above)
        if: ${{ github.event_name != 'pull_request' || needs.paths.outputs.dependency_changes == 'true' }}
        run: pnpm deps:audit

      - name: Determine zizmor inputs
        id: zizmor-inputs
        if: ${{ github.event_name != 'pull_request' || needs.paths.outputs.workflow_security == 'true' }}
        run: |
          set -euo pipefail
          default_inputs=".github/workflows/deploy.yml .github/workflows/admin-e2e-smoke.yml .github/workflows/deep-quality-lane.yml .github/workflows/dependabot-trigger.yml .github/workflows/dependency-health-nightly.yml"
          inputs="$default_inputs"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff --name-only --diff-filter=ACMR origin/main...HEAD > changed-files.txt
            grep -E '^(\.github/workflows/.*\.(yml|yaml)|\.github/actions/.*)$' changed-files.txt > changed-workflow-security-targets.txt || true
            if [ -s changed-workflow-security-targets.txt ]; then
              inputs="$(tr '\n' ' ' < changed-workflow-security-targets.txt | sed -E 's/[[:space:]]+$//')"
            fi
          fi

          echo "inputs=${inputs}" >> "$GITHUB_OUTPUT"

      - name: GitHub workflow lint (actionlint)
        if: ${{ github.event_name != 'pull_request' || needs.paths.outputs.workflow_security == 'true' }}
        uses: reviewdog/action-actionlint@0d952c597ef8459f634d7145b0b044a9699e5e43 # v1.71.0
        with:
          reporter: github-check
          filter_mode: nofilter
          fail_level: error

      - name: GitHub workflow security audit (zizmor)
        if: ${{ github.event_name != 'pull_request' || needs.paths.outputs.workflow_security == 'true' }}
        uses: zizmorcore/zizmor-action@0dce2577a4760a2749d8cfb7a84b7d5585ebcb7d # v0.5.0
        with:
          advanced-security: 'false'
          annotations: 'true'
          config: zizmor.yml
          inputs: ${{ steps.zizmor-inputs.outputs.inputs }}
          persona: regular
          min-severity: medium
          min-confidence: medium

      - name: Setup Python for detect-secrets
        if: ${{ github.event_name != 'pull_request' || needs.paths.outputs.deep_quality == 'true' || needs.paths.outputs.workflow_security == 'true' }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install detect-secrets
        if: ${{ github.event_name != 'pull_request' || needs.paths.outputs.deep_quality == 'true' || needs.paths.outputs.workflow_security == 'true' }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install detect-secrets==1.5.0

      - name: Detect secrets
        if: ${{ github.event_name != 'pull_request' || needs.paths.outputs.deep_quality == 'true' || needs.paths.outputs.workflow_security == 'true' }}
        run: |
          # Workflow edits can move known secret markers, so keep the baseline aligned in-PR.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff --name-only --diff-filter=ACMR origin/main...HEAD > changed-files.txt
            grep -Ev '(^|/)pnpm-lock\.yaml$' changed-files.txt > changed-files-secret-scan.txt || true
            if [ -s changed-files-secret-scan.txt ]; then
              tr '\n' '\0' < changed-files-secret-scan.txt | xargs -0 detect-secrets-hook --baseline .secrets.baseline
            else
              echo "No changed files found for secret scan."
            fi
          else
            detect-secrets scan --baseline .secrets.baseline
          fi

      - name: Lint
        id: lint
        run: pnpm lint

      - name: Generate job summary
        if: always()
        run: |
          {
            echo "## Static Checks Summary"
            echo "- **Lint**: ${{ steps.lint.outcome }}"
            echo "- **Dependency Dedupe**: ${{ steps.dedupe.outcome || 'skipped' }}"
          } >> "$GITHUB_STEP_SUMMARY"

  unit-tests:
    name: Unit Tests
    needs:
      - paths
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: mkdir -p ~/.cache/ms-playwright && pnpm exec playwright install chromium

      - name: Run unit tests
        id: unit
        run: pnpm vitest --project unit --run --coverage

      - name: Publish Unit Test coverage
        if: ${{ steps.unit.outcome == 'success' || steps.unit.outcome == 'failure' }}
        uses: davelosert/vitest-coverage-report-action@15b5b41bb7d36796d89f4bf482b09529c53f3446
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          vite-config-path: .github/coverage/vitest.thresholds.unit.js
          name: Unit Tests
          file-coverage-mode: all
          json-summary-path: coverage/unit/coverage-summary.json
          json-final-path: coverage/unit/coverage-final.json

      - name: Upload unit coverage artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-unit
          path: |
            coverage/unit/coverage-summary.json
            coverage/unit/coverage-final.json
          if-no-files-found: ignore

      - name: Generate job summary
        if: always()
        run: |
          {
            echo "## Unit Tests Summary"
            echo "- **Unit Tests**: ${{ steps.unit.outcome }}"
          } >> "$GITHUB_STEP_SUMMARY"

  storybook-tests:
    name: Storybook Tests
    needs:
      - paths
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: mkdir -p ~/.cache/ms-playwright && pnpm exec playwright install chromium

      - name: Run Storybook tests
        id: storybook
        # Note:
        # Storybook tests run in a real browser via Vitest Browser + Playwright.
        # On GitHub runners (cold caches), Vite can sometimes try to optimize deps mid-run,
        # which triggers a page reload and can surface as flaky/odd errors (often around mocking).
        # We pre-bundle key deps in .storybook/main.ts and vitest.config.ts to avoid that.
        run: pnpm vitest --project storybook --run --coverage

      - name: Publish Storybook coverage
        if: ${{ steps.storybook.outcome == 'success' || steps.storybook.outcome == 'failure' }}
        uses: davelosert/vitest-coverage-report-action@15b5b41bb7d36796d89f4bf482b09529c53f3446
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          vite-config-path: .github/coverage/vitest.thresholds.storybook.js
          name: Storybook Tests
          file-coverage-mode: all
          json-summary-path: coverage/storybook/coverage-summary.json
          json-final-path: coverage/storybook/coverage-final.json

      - name: Upload storybook coverage artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-storybook
          path: |
            coverage/storybook/coverage-summary.json
            coverage/storybook/coverage-final.json
          if-no-files-found: ignore

      - name: Generate job summary
        if: always()
        run: |
          {
            echo "## Storybook Tests Summary"
            echo "- **Storybook Tests**: ${{ steps.storybook.outcome }}"
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    name: Build
    needs:
      - ci-static
      - unit-tests
      - storybook-tests
      - paths
    if: github.event_name != 'pull_request' || needs.paths.outputs.deployable == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
      PREVIEW_SECRET: ${{ secrets.PREVIEW_SECRET }}
      DATABASE_URI: postgresql://postgres:password@localhost:5432/findmydoc-portal
    services:
      postgres:
        image: postgis/postgis:15-3.3
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: findmydoc-portal
        options: >-
          --health-cmd "pg_isready -U postgres -h localhost -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Restore pnpm store cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.pnpm-store
          key: pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-

      - name: Install dependencies
        run: pnpm install

      # Note: Permission matrix already verified in CI job, skip here to save time

      - name: Detect schema and migration file changes
        id: migration_diff
        env:
          CI_EVENT_NAME: ${{ github.event_name }}
          CI_BASE_REF: ${{ github.base_ref }}
        run: bash ./.github/scripts/ci/detect-migration-diff.sh "$CI_EVENT_NAME" "$CI_BASE_REF"

      - name: Wait for PostgreSQL service
        run: bash ./.github/scripts/ci/wait-for-postgres.sh "${{ job.services.postgres.id }}"

      - name: Run database migrations
        run: pnpm run migrate

      - name: Check migration status
        run: pnpm run payload migrate:status

      - name: Enforce committed migrations for schema changes
        if: steps.migration_diff.outputs.schema_changed == 'true' && steps.migration_diff.outputs.migrations_changed != 'true'
        run: bash ./.github/scripts/ci/enforce-schema-migration.sh

      - name: Build application (static check)
        run: pnpm build
      - name: Generate job summary
        if: always()
        run: |
          {
            echo "## Build Job Summary"
            echo "- **Build**: ${{ job.status }}"
          } >> "$GITHUB_STEP_SUMMARY"

  integration-tests:
    name: Integration Tests
    needs:
      - build
      - paths
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.paths.outputs.deployable == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
    env:
      PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
      PREVIEW_SECRET: ${{ secrets.PREVIEW_SECRET }}
      DATABASE_URI: postgresql://postgres:password@localhost:5432/findmydoc-portal
    services:
      postgres:
        image: postgis/postgis:15-3.3
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: findmydoc-portal
        options: >-
          --health-cmd "pg_isready -U postgres -h localhost -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Restore pnpm store cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.pnpm-store
          key: pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Wait for PostgreSQL service
        run: bash ./.github/scripts/ci/wait-for-postgres.sh "${{ job.services.postgres.id }}"

      - name: Run database migrations
        run: pnpm run migrate

      - name: Check migration status
        run: pnpm run payload migrate:status

      - name: Run integration tests
        id: integration
        env:
          NODE_ENV: test
        run: pnpm vitest --project integration --run --coverage --reporter=verbose

      - name: Publish integration coverage
        if: ${{ steps.integration.outcome == 'success' || steps.integration.outcome == 'failure' }}
        uses: davelosert/vitest-coverage-report-action@15b5b41bb7d36796d89f4bf482b09529c53f3446
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          vite-config-path: .github/coverage/vitest.thresholds.integration.js
          name: Integration Tests
          file-coverage-mode: all
          json-summary-path: coverage/integration/coverage-summary.json
          json-final-path: coverage/integration/coverage-final.json

      - name: Upload integration coverage artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-integration
          path: |
            coverage/integration/coverage-summary.json
            coverage/integration/coverage-final.json
          if-no-files-found: ignore

      - name: Generate job summary
        if: always()
        run: |
          {
            echo "## Integration Tests Summary"
            echo "- **Integration Tests**: ${{ steps.integration.outcome }}"
          } >> "$GITHUB_STEP_SUMMARY"

  coverage-merge:
    name: Combined Coverage
    needs:
      - unit-tests
      - storybook-tests
      - integration-tests
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download coverage artifacts
        continue-on-error: true
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: coverage-*
          path: coverage-artifacts
          merge-multiple: true

      - name: Merge coverage summaries
        run: node scripts/coverage/merge-coverage.mjs --input-root coverage-artifacts --output-root coverage/combined

      - name: Upload combined coverage artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-combined
          path: coverage/combined/**
          if-no-files-found: ignore

      - name: Publish combined coverage summary
        if: always()
        run: |
          if [ -f coverage/combined/summary.md ]; then
            cat coverage/combined/summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Combined coverage summary not available." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Prepare combined coverage PR comment
        id: combined_coverage_comment
        if: github.event_name == 'pull_request'
        run: |
          if [ -f coverage/combined/summary.md ]; then
            {
              echo 'message<<EOF'
              cat coverage/combined/summary.md
              echo EOF
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo 'message<<EOF'
              echo '# Combined Coverage Summary'
              echo
              echo 'Combined coverage summary not available.'
              echo EOF
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Comment combined coverage on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2.9.4
        with:
          header: combined-coverage-summary
          message: ${{ steps.combined_coverage_comment.outputs.message }}

  Deploy-Preview:
    name: Deploy Preview
    if: (github.event_name == 'pull_request' || github.ref == 'refs/heads/main') && needs.paths.outputs.deployable == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - build
      - paths
    environment:
      name: Preview
      url: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') && format('https://{0}', env.PREVIEW_ALIAS_DOMAIN) || steps.vercel_preview.outputs.deploymentUrl }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Pull Vercel Environment Variables for Preview
        run: pnpm dlx vercel@canary pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (Preview)
        id: vercel_preview
        run: bash ./.github/scripts/deploy/vercel-deploy.sh preview

      # Only main pushes publish the fixed preview alias.
      - name: Set Preview Alias
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: pnpm dlx vercel@canary alias set ${{ steps.vercel_preview.outputs.deploymentUrl }} ${{ env.PREVIEW_ALIAS_DOMAIN }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Generate deployment summary
        if: always()
        run: |
          alias_domain=""
          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == "refs/heads/main" ]]; then
            alias_domain="${PREVIEW_ALIAS_DOMAIN}"
          fi

          bash ./.github/scripts/deploy/write-preview-summary.sh "${{ steps.vercel_preview.outcome }}" "${{ steps.vercel_preview.outputs.deploymentUrl }}" "${alias_domain}"

  Deploy-Production:
    name: Deploy Production
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && needs.paths.outputs.deployable == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - build
      - Deploy-Preview
      - paths
    environment:
      name: Production
      url: ${{ steps.vercel_production.outputs.deploymentUrl }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Pull Vercel Environment Variables for Production
        run: pnpm dlx vercel@canary pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (Production)
        id: vercel_production
        run: bash ./.github/scripts/deploy/vercel-deploy.sh production

      - name: Set Production Alias
        run: pnpm dlx vercel@canary alias set ${{ steps.vercel_production.outputs.deploymentUrl }} ${{ env.PRODUCTION_ALIAS_DOMAIN }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Generate deployment summary
        if: always()
        run: bash ./.github/scripts/deploy/write-production-summary.sh "${{ steps.vercel_production.outcome }}" "${{ steps.vercel_production.outputs.deploymentUrl }}"
