name: Dependency Health Nightly

on:
  schedule:
    - cron: '15 4 * * *'
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Optional PR number to comment with the nightly report.'
        required: false
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  outdated-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NODE_VERSION: 22
      PNPM_VERSION: 10.28.2
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@b307475762933b98ed359c036b0e51f26b63b74b # v5.0.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Generate outdated dependency report
        run: |
          set -euo pipefail
          report_time="$(date -u '+%Y-%m-%d %H:%M:%SZ')"

          if pnpm deps:outdated > dependency-outdated.txt 2>&1; then
            status="clean"
          else
            status="updates-available"
          fi

          {
            echo "# Dependency Health Report"
            echo
            echo "- Generated at (UTC): ${report_time}"
            echo "- Status: ${status}"
            echo
            echo "## pnpm deps:outdated"
            echo
            echo '```txt'
            cat dependency-outdated.txt
            echo '```'
          } > dependency-health-report.md

      - name: Upload report artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: dependency-health-report
          path: |
            dependency-outdated.txt
            dependency-health-report.md
          retention-days: 14

      - name: Add workflow summary
        run: cat dependency-health-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Comment report on PR
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.pr_number != '' }}
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
        with:
          script: |
            const fs = require('fs')
            const report = fs.readFileSync('dependency-health-report.md', 'utf8')
            const prNumber = Number(process.env.PR_NUMBER)
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: report,
            })
