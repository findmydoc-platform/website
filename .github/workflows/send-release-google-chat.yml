name: Send Release Google Chat

on:
  workflow_dispatch:
    inputs:
      message_payload_json:
        description: Full Google Chat JSON payload
        required: true
        type: string
      release_tag:
        description: Release tag for the audit trail
        required: false
        type: string

permissions: {}

concurrency:
  group: send-release-google-chat-${{ github.event.inputs.release_tag || github.run_id }}
  cancel-in-progress: false

jobs:
  send:
    name: Send Google Chat notification
    runs-on: ubuntu-latest
    env:
      GOOGLE_CHAT_WEBHOOK_URL: ${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}
      MESSAGE_PAYLOAD_JSON: ${{ inputs.message_payload_json }}
      RELEASE_TAG: ${{ inputs.release_tag }}
    steps:
      - name: Validate inputs and repository secret
        run: |
          set -euo pipefail

          if [ -z "${GOOGLE_CHAT_WEBHOOK_URL}" ]; then
            echo "GOOGLE_CHAT_WEBHOOK_URL repository secret is missing." >&2
            exit 1
          fi

          if [ -z "${MESSAGE_PAYLOAD_JSON}" ]; then
            echo "message_payload_json input is missing." >&2
            exit 1
          fi

          python3 - <<'PY'
          import json
          import os

          try:
              payload = json.loads(os.environ["MESSAGE_PAYLOAD_JSON"])
          except json.JSONDecodeError as error:
              raise SystemExit(f"message_payload_json is not valid JSON: {error}") from error

          if not isinstance(payload, dict):
              raise SystemExit("message_payload_json must be a JSON object.")

          thread = payload.get("thread")
          if thread is not None:
              if not isinstance(thread, dict) or not isinstance(thread.get("threadKey"), str) or not thread["threadKey"].strip():
                  raise SystemExit("message_payload_json thread.threadKey must be a non-empty string when thread is present.")
          PY

      - name: Send Google Chat webhook
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.parse
          import urllib.error
          import urllib.request

          payload = json.loads(os.environ["MESSAGE_PAYLOAD_JSON"])
          webhook_url = os.environ["GOOGLE_CHAT_WEBHOOK_URL"]
          if payload.get("thread", {}).get("threadKey"):
              parsed_url = urllib.parse.urlparse(webhook_url)
              query_pairs = urllib.parse.parse_qsl(parsed_url.query, keep_blank_values=True)
              query = dict(query_pairs)
              query["messageReplyOption"] = "REPLY_MESSAGE_FALLBACK_TO_NEW_THREAD"
              webhook_url = urllib.parse.urlunparse(
                  parsed_url._replace(query=urllib.parse.urlencode(query))
              )

          body = json.dumps(payload).encode("utf-8")
          request = urllib.request.Request(
              webhook_url,
              data=body,
              method="POST",
              headers={"Content-Type": "application/json; charset=UTF-8"},
          )

          try:
              with urllib.request.urlopen(request) as response:
                  status = response.getcode()
                  if status < 200 or status >= 300:
                      raise RuntimeError(f"Unexpected Google Chat status: {status}")
                  print(f"Google Chat webhook delivered with status {status}.")
          except urllib.error.HTTPError as error:
              body = error.read().decode("utf-8", errors="replace")
              raise SystemExit(f"Google Chat webhook returned {error.code}: {body}") from error
          PY

      - name: Write job summary
        run: |
          HAS_CARDS_V2="$(python3 - <<'PY'
          import json
          import os

          payload = json.loads(os.environ["MESSAGE_PAYLOAD_JSON"])
          print("yes" if payload.get("cardsV2") else "no")
          PY
          )"
          THREAD_KEY="$(python3 - <<'PY'
          import json
          import os

          payload = json.loads(os.environ["MESSAGE_PAYLOAD_JSON"])
          print(payload.get("thread", {}).get("threadKey", "none"))
          PY
          )"
          {
            echo "## Google Chat Release Notification"
            if [ -n "${RELEASE_TAG}" ]; then
              echo "- Release: ${RELEASE_TAG}"
            fi
            echo "- Payload: JSON object"
            echo "- cardsV2: ${HAS_CARDS_V2}"
            echo "- Thread key: ${THREAD_KEY}"
            echo "- Status: sent"
          } >> "$GITHUB_STEP_SUMMARY"
