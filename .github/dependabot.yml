version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'tuesday'
      time: '08:00'
      timezone: 'Europe/Berlin'
    cooldown:
      semver-patch-days: 3
      semver-minor-days: 7
      semver-major-days: 30
    commit-message:
      prefix: 'chore'
      prefix-development: 'build'
      include: 'scope'
    groups:
      # 1) PayloadCMS-specific together
      payloadcms:
        patterns:
          - '@payloadcms/**'
          - 'payload'
        update-types:
          - 'patch'
          - 'minor'

      # 2) dev dependencies
      dev-dependencies:
        dependency-type: 'development'
        patterns:
          - '*'
        update-types:
          - 'patch'
          - 'minor'

      # 3) all app deps
      dependencies:
        dependency-type: 'production'
        patterns:
          - '*'
        update-types:
          - 'patch'
          - 'minor'
    open-pull-requests-limit: 5

  - package-ecosystem: 'docker'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'wednesday'
      time: '08:00'
      timezone: 'Europe/Berlin'
    cooldown:
      default-days: 7
    commit-message:
      prefix: 'chore'
      include: 'scope'
    ignore:
      - dependency-name: 'node'
        update-types: ['version-update:semver-major']

  - package-ecosystem: 'github-actions'
    directory: '/.github'
    schedule:
      interval: 'weekly'
      day: 'thursday'
      time: '08:00'
      timezone: 'Europe/Berlin'
    cooldown:
      default-days: 7
    commit-message:
      prefix: 'chore'
      include: 'scope'
    open-pull-requests-limit: 5
