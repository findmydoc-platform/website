name: Deploy Production

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  NODE_VERSION: 24.14.0
  PNPM_VERSION: 10.28.2
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  PRODUCTION_ALIAS_DOMAIN: findmydoc.eu
  NEXT_TELEMETRY_DISABLED: 1

defaults:
  run:
    shell: bash

jobs:
  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: Production
      url: ${{ steps.vercel_production.outputs.deploymentUrl }}
    steps:
      - name: Require main branch
        run: |
          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "::error::Deploy Production can only run from refs/heads/main."
            exit 1
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Pull Vercel Environment Variables for Production
        run: pnpm dlx vercel@canary pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (Production)
        id: vercel_production
        run: bash ./.github/scripts/deploy/vercel-deploy.sh production

      - name: Set Production Alias
        run: pnpm dlx vercel@canary alias set ${{ steps.vercel_production.outputs.deploymentUrl }} ${{ env.PRODUCTION_ALIAS_DOMAIN }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Generate deployment summary
        if: always()
        run: bash ./.github/scripts/deploy/write-production-summary.sh "${{ steps.vercel_production.outcome }}" "${{ steps.vercel_production.outputs.deploymentUrl }}"
