version = 1
name = "website"

[setup]
script = "bash -lc 'set -euo pipefail; branch=\"$(git branch --show-current || true)\"; git fetch origin main; if [ \"$branch\" = main ]; then git pull --ff-only origin main; else git rebase origin/main; fi; pnpm install'"

[[actions]]
name = "Run"
icon = "run"
command = "pnpm dev"

[[actions]]
name = "run unit tests"
icon = "test"
command = "pnpm tests --project=unit"

[[actions]]
name = "run integration tests"
icon = "test"
command = "pnpm tests --project=integration"

[[actions]]
name = "run storybook tests"
icon = "test"
command = "pnpm tests --project=storybook"

[[actions]]
name = "Run Storybooks"
icon = "tool"
command = "pnpm storybook"

[[actions]]
name = "Cleanup"
icon = "tool"
command = "pnpm cleanup"
