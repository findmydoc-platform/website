name: Reset Database

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: 'Type RESET_PREVIEW_DB to confirm preview database reset'
        required: true
        type: string

permissions:
  contents: read

env:
  NODE_VERSION: 24.14.0
  PNPM_VERSION: 10.28.2
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  reset-preview-database:
    name: Reset Preview Database
    runs-on: ubuntu-latest
    environment: Preview

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@b307475762933b98ed359c036b0e51f26b63b74b # v5.0.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Reset preview database with fresh migrations
        env:
          DATABASE_URI: ${{ secrets.DATABASE_URI }}
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
          RESET_CONFIRMATION: ${{ github.event.inputs.confirmation }}
        run: bash ./.github/scripts/ci/reset-preview-database.sh "$RESET_CONFIRMATION"
