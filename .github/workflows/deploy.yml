name: PR Validation

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '.github/workflows/**'
      - '.github/actions/**'
      - '.secrets.baseline'
      - 'zizmor.yml'
      - '**/.github/dependabot.yml'
      - '**/*.md'
      - '**/.vscode/settings.json'
  push:
    branches: [main]
    paths-ignore:
      - '.github/workflows/**'
      - '.github/actions/**'
      - '.secrets.baseline'
      - 'zizmor.yml'
      - '**/.github/dependabot.yml'
      - '**/*.md'
      - '**/.vscode/settings.json'
  workflow_dispatch:

env:
  NODE_VERSION: 24.14.0
  PNPM_VERSION: 10.28.2
  NEXT_TELEMETRY_DISABLED: 1

defaults:
  run:
    shell: bash

jobs:
  paths:
    name: Path Filter
    runs-on: ubuntu-latest
    outputs:
      deployable: ${{ steps.set-path-outputs.outputs.deployable }}
      integration: ${{ steps.set-path-outputs.outputs.integration }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Detect validation-relevant changes
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            deployable:
              - '**'
              - '!docs/**'
              - '!tests/**'
              - '!.storybook/**'
              - '!src/stories/**'
              - '!**/*.stories.{ts,tsx}'
              - '!**/*.md'
            integration:
              - 'src/access/**'
              - 'src/app/api/**'
              - 'src/auth/**'
              - 'src/collections/**'
              - 'src/endpoints/seed/**'
              - 'src/hooks/**'
              - 'src/migrations/**'
              - 'src/payload.config.ts'
              - 'scripts/test-database-harness.mjs'
              - 'tests/integration/**'
              - 'tests/setup/**'
              - 'vitest.config.ts'

      - name: Set path outputs
        id: set-path-outputs
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            {
              echo "deployable=true"
              echo "integration=true"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "deployable=${{ steps.filter.outputs.deployable }}"
              echo "integration=${{ steps.filter.outputs.integration }}"
            } >> "$GITHUB_OUTPUT"
          fi

  ci-static:
    name: Static Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Check formatting
        run: pnpm format:check

      - name: Generate permission matrix JSON
        run: pnpm matrix:derive json

      - name: Verify permission matrix alignment
        run: pnpm matrix:verify

      - name: Check migrations
        run: bash ./.github/scripts/ci/check-migrations-diff.sh "origin/main" "HEAD"

      - name: Check payload types
        run: pnpm run check:payload-types

      - name: Story governance check
        run: pnpm stories:governance:check

      - name: Lint
        id: lint
        run: pnpm lint

      - name: Generate job summary
        if: always()
        run: |
          {
            echo "## Static Checks Summary"
            echo "- **Lint**: ${{ steps.lint.outcome }}"
          } >> "$GITHUB_STEP_SUMMARY"

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: mkdir -p ~/.cache/ms-playwright && pnpm exec playwright install chromium

      - name: Run unit tests
        id: unit
        run: pnpm vitest --project unit --run --coverage

      - name: Publish Unit Test coverage
        if: ${{ steps.unit.outcome == 'success' || steps.unit.outcome == 'failure' }}
        uses: davelosert/vitest-coverage-report-action@15b5b41bb7d36796d89f4bf482b09529c53f3446
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          vite-config-path: .github/coverage/vitest.thresholds.unit.js
          name: Unit Tests
          file-coverage-mode: all
          json-summary-path: coverage/unit/coverage-summary.json
          json-final-path: coverage/unit/coverage-final.json

      - name: Upload unit coverage artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-unit
          path: |
            coverage/unit/coverage-summary.json
            coverage/unit/coverage-final.json
          if-no-files-found: ignore

      - name: Generate job summary
        if: always()
        run: |
          {
            echo "## Unit Tests Summary"
            echo "- **Unit Tests**: ${{ steps.unit.outcome }}"
          } >> "$GITHUB_STEP_SUMMARY"

  storybook-tests:
    name: Storybook Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: mkdir -p ~/.cache/ms-playwright && pnpm exec playwright install chromium

      - name: Run Storybook tests
        id: storybook
        run: pnpm vitest --project storybook --run --coverage

      - name: Publish Storybook coverage
        if: ${{ steps.storybook.outcome == 'success' || steps.storybook.outcome == 'failure' }}
        uses: davelosert/vitest-coverage-report-action@15b5b41bb7d36796d89f4bf482b09529c53f3446
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          vite-config-path: .github/coverage/vitest.thresholds.storybook.js
          name: Storybook Tests
          file-coverage-mode: all
          json-summary-path: coverage/storybook/coverage-summary.json
          json-final-path: coverage/storybook/coverage-final.json

      - name: Upload storybook coverage artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-storybook
          path: |
            coverage/storybook/coverage-summary.json
            coverage/storybook/coverage-final.json
          if-no-files-found: ignore

      - name: Generate job summary
        if: always()
        run: |
          {
            echo "## Storybook Tests Summary"
            echo "- **Storybook Tests**: ${{ steps.storybook.outcome }}"
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    name: Build
    needs:
      - ci-static
      - unit-tests
      - storybook-tests
      - paths
    if: github.event_name != 'pull_request' || needs.paths.outputs.deployable == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
      PREVIEW_SECRET: ${{ secrets.PREVIEW_SECRET }}
      DATABASE_URI: postgresql://postgres:password@localhost:5432/findmydoc-portal
    services:
      postgres:
        image: postgis/postgis:15-3.3
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: findmydoc-portal
        options: >-
          --health-cmd "pg_isready -U postgres -h localhost -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Detect schema and migration file changes
        id: migration_diff
        env:
          CI_EVENT_NAME: ${{ github.event_name }}
          CI_BASE_REF: ${{ github.base_ref }}
        run: bash ./.github/scripts/ci/detect-migration-diff.sh "$CI_EVENT_NAME" "$CI_BASE_REF"

      - name: Wait for PostgreSQL service
        run: bash ./.github/scripts/ci/wait-for-postgres.sh "${{ job.services.postgres.id }}"

      - name: Run database migrations
        run: pnpm run migrate

      - name: Check migration status
        run: pnpm run payload migrate:status

      - name: Enforce committed migrations for schema changes
        if: steps.migration_diff.outputs.schema_changed == 'true' && steps.migration_diff.outputs.migrations_changed != 'true'
        run: bash ./.github/scripts/ci/enforce-schema-migration.sh

      - name: Restore Next.js build cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: .next/cache
          key: nextjs-build-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('next.config.js', 'src/**/*.[jt]s', 'src/**/*.[jt]sx') }}
          restore-keys: |
            nextjs-build-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Build application (static check)
        run: pnpm build

      - name: Generate job summary
        if: always()
        run: |
          {
            echo "## Build Job Summary"
            echo "- **Build**: ${{ job.status }}"
          } >> "$GITHUB_STEP_SUMMARY"

  integration-tests:
    name: Integration Tests
    needs:
      - ci-static
      - paths
    if: >-
      (github.event_name == 'pull_request' && needs.paths.outputs.integration == 'true') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.paths.outputs.deployable == 'true') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
    env:
      PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
      PREVIEW_SECRET: ${{ secrets.PREVIEW_SECRET }}
      DATABASE_URI: postgresql://postgres:password@localhost:5432/findmydoc-portal
    services:
      postgres:
        image: postgis/postgis:15-3.3
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: findmydoc-portal
        options: >-
          --health-cmd "pg_isready -U postgres -h localhost -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Wait for PostgreSQL service
        run: bash ./.github/scripts/ci/wait-for-postgres.sh "${{ job.services.postgres.id }}"

      - name: Run database migrations
        run: pnpm run migrate

      - name: Check migration status
        run: pnpm run payload migrate:status

      - name: Run integration tests
        id: integration
        env:
          NODE_ENV: test
        run: pnpm vitest --project integration --run --coverage --reporter=verbose

      - name: Publish integration coverage
        if: ${{ steps.integration.outcome == 'success' || steps.integration.outcome == 'failure' }}
        uses: davelosert/vitest-coverage-report-action@15b5b41bb7d36796d89f4bf482b09529c53f3446
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          vite-config-path: .github/coverage/vitest.thresholds.integration.js
          name: Integration Tests
          file-coverage-mode: all
          json-summary-path: coverage/integration/coverage-summary.json
          json-final-path: coverage/integration/coverage-final.json

      - name: Upload integration coverage artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-integration
          path: |
            coverage/integration/coverage-summary.json
            coverage/integration/coverage-final.json
          if-no-files-found: ignore

      - name: Generate job summary
        if: always()
        run: |
          {
            echo "## Integration Tests Summary"
            echo "- **Integration Tests**: ${{ steps.integration.outcome }}"
          } >> "$GITHUB_STEP_SUMMARY"

  coverage-merge:
    name: Combined Coverage
    needs:
      - unit-tests
      - storybook-tests
      - integration-tests
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download coverage artifacts
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: coverage-*
          path: coverage-artifacts

      - name: Merge coverage summaries
        run: node scripts/coverage/merge-coverage.mjs --input-root coverage-artifacts --output-root coverage/combined

      - name: Upload combined coverage artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-combined
          path: coverage/combined/**
          if-no-files-found: ignore

      - name: Publish combined coverage summary
        if: always()
        run: |
          if [ -f coverage/combined/summary.md ]; then
            cat coverage/combined/summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Combined coverage summary not available." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Prepare combined coverage PR comment
        id: combined_coverage_comment
        if: github.event_name == 'pull_request'
        run: |
          if [ -f coverage/combined/summary.md ]; then
            {
              echo 'message<<EOF'
              cat coverage/combined/summary.md
              echo EOF
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo 'message<<EOF'
              echo '# Combined Coverage Summary'
              echo
              echo 'Combined coverage summary not available.'
              echo EOF
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Comment combined coverage on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2.9.4
        with:
          header: combined-coverage-summary
          message: ${{ steps.combined_coverage_comment.outputs.message }}
