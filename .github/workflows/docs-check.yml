name: Docs Check

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  detect-docs-changes:
    name: detect docs changes
    runs-on: ubuntu-24.04
    outputs:
      docs_changed: ${{ steps.filter.outputs.docs }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Detect README/docs changes
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            docs:
              - 'README.md'
              - 'docs/**'

  docs-check:
    name: docs consistency
    needs: detect-docs-changes
    if: needs.detect-docs-changes.outputs.docs_changed == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24.14.0

      - name: Run docs consistency check
        run: pnpm docs:check

  docs-policy-gate:
    name: docs policy gate
    needs:
      - detect-docs-changes
      - docs-check
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: Enforce conditional docs check policy
        run: |
          if [ "${{ needs.detect-docs-changes.result }}" != "success" ]; then
            echo "Docs change detection did not complete successfully."
            exit 1
          fi

          if [ "${{ needs.detect-docs-changes.outputs.docs_changed }}" = "true" ] && [ "${{ needs.docs-check.result }}" != "success" ]; then
            echo "README/docs changed, but docs consistency check did not pass."
            exit 1
          fi

          echo "Docs policy satisfied."
