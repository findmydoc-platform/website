name: CI & CD

permissions:
  contents: read
  pull-requests: write

# Prevent concurrent runs on the same PR or branch
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '!**/.github/workflows/**'
      - '**/.github/dependabot.yml'
      - '**/*.md'
      - '**/.github/instructions/**'
      - '**/.github/prompts/**'
      - '**/copilot-instructions.md'
      - '**/.vscode/settings.json'
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  NODE_VERSION: 22
  PNPM_VERSION: 10.28.2
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  NEXT_TELEMETRY_DISABLED: 1

defaults:
  run:
    shell: bash

jobs:
  paths:
    name: 🧭 Path Filter
    runs-on: ubuntu-latest
    outputs:
      deployable: ${{ steps.set-deployable.outputs.deployable }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Evaluate deployable changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            deployable:
              - '**'
              - '!docs/**'
              - '!tests/**'
              - '!.storybook/**'
              - '!src/stories/**'
              - '!**/*.stories.{ts,tsx}'
              - '!**/*.md'

      - name: Set deployable output
        id: set-deployable
        run: bash ./.github/scripts/ci/set-deployable-output.sh "${{ github.event_name }}" "${{ steps.filter.outputs.deployable }}"

  ci:
    name: ✅ Check & Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Restore pnpm store cache
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Check formatting
        run: pnpm format:check

      - name: Generate permission matrix JSON
        run: pnpm matrix:derive json

      - name: Verify permission matrix alignment
        run: pnpm matrix:verify

      - name: Check migrations
        run: bash ./.github/scripts/ci/check-migrations-diff.sh "origin/main" "HEAD"

      - name: Lint
        id: lint
        run: pnpm lint

      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install chromium

      - name: Run unit tests
        id: vitest
        run: pnpm vitest --project unit --run --coverage

      - name: Run Storybook tests
        id: storybook
        if: ${{ steps.vitest.outcome == 'success' || steps.vitest.outcome == 'failure' }}
        # Note:
        # Storybook tests run in a real browser via Vitest Browser + Playwright.
        # On GitHub runners (cold caches), Vite can sometimes try to optimize deps mid-run,
        # which triggers a page reload and can surface as flaky/odd errors (often around mocking).
        # We pre-bundle key deps in .storybook/main.ts and vitest.config.ts to avoid that.
        run: pnpm vitest --project storybook --run --coverage

      - name: Publish Unit Test coverage
        if: ${{ steps.vitest.outcome == 'success' || steps.vitest.outcome == 'failure' }}
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          vite-config-path: .github/coverage/vitest.thresholds.unit.js
          name: Unit Tests
          file-coverage-mode: all
          json-summary-path: coverage/unit/coverage-summary.json
          json-final-path: coverage/unit/coverage-final.json

      - name: Publish Storybook coverage
        if: ${{ steps.storybook.outcome == 'success' || steps.storybook.outcome == 'failure' }}
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          vite-config-path: .github/coverage/vitest.thresholds.storybook.js
          name: Storybook Tests
          file-coverage-mode: all
          json-summary-path: coverage/storybook/coverage-summary.json
          json-final-path: coverage/storybook/coverage-final.json

      - name: Generate job summary
        if: always()
        run: bash ./.github/scripts/ci/write-ci-summary.sh "${{ steps.lint.outcome }}" "${{ steps.vitest.outcome }}" "${{ steps.storybook.outcome }}"

  build:
    name: 🔨 Build
    needs:
      - ci
      - paths
    if: github.event_name != 'pull_request' || needs.paths.outputs.deployable == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
      PREVIEW_SECRET: ${{ secrets.PREVIEW_SECRET }}
      DATABASE_URI: postgresql://postgres:password@localhost:5432/findmydoc-portal
    services:
      postgres:
        image: postgis/postgis:15-3.3
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: findmydoc-portal
        options: >-
          --health-cmd "pg_isready -U postgres -h localhost -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Restore pnpm store cache
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-

      - name: Install dependencies
        run: pnpm install

      # Note: Permission matrix already verified in CI job, skip here to save time

      - name: Detect schema and migration file changes
        id: migration_diff
        run: bash ./.github/scripts/ci/detect-migration-diff.sh "${{ github.event_name }}" "${{ github.base_ref }}"

      - name: Wait for PostgreSQL service
        run: bash ./.github/scripts/ci/wait-for-postgres.sh "${{ job.services.postgres.id }}"

      - name: Enforce committed migrations for schema changes
        if: steps.migration_diff.outputs.schema_changed == 'true' && steps.migration_diff.outputs.migrations_changed != 'true'
        run: bash ./.github/scripts/ci/enforce-schema-migration.sh

      - name: Run database migrations
        run: pnpm run migrate

      - name: Check migration status
        run: pnpm run payload migrate:status

      - name: Build application (static check)
        run: pnpm build

      - name: Run integration tests
        id: integration_tests
        env:
          NODE_ENV: test
        run: pnpm vitest --project integration --run --coverage --reporter=verbose

      - name: Publish coverage summary
        if: ${{ steps.integration_tests.outcome == 'success' }}
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          vite-config-path: .github/coverage/vitest.thresholds.integration.js
          name: Integration Tests
          file-coverage-mode: all
          json-summary-path: coverage/integration/coverage-summary.json
          json-final-path: coverage/integration/coverage-final.json

      - name: Generate job summary
        if: always()
        run: bash ./.github/scripts/ci/write-build-summary.sh "${{ job.status }}" "${{ steps.integration_tests.outcome }}"

  Deploy-Preview:
    name: Deploy Preview
    if: (github.event_name == 'pull_request' || github.ref == 'refs/heads/main') && needs.paths.outputs.deployable == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - build
      - paths
    environment:
      name: Preview
      url: ${{ steps.vercel_preview.outputs.deploymentUrl }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Pull Vercel Environment Variables for Preview
        run: pnpm dlx vercel@canary pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (Preview)
        id: vercel_preview
        run: bash ./.github/scripts/deploy/vercel-deploy.sh preview

      # fixed url has to be manually set because Vercel does not automatically set it for preview deployments
      - name: Set Preview Alias
        run: pnpm dlx vercel@canary alias set ${{ steps.vercel_preview.outputs.deploymentUrl }} findmydoc-portal-tst.vercel.app --token=${{ secrets.VERCEL_TOKEN }}

      - name: Generate deployment summary
        if: always()
        run: bash ./.github/scripts/deploy/write-preview-summary.sh "${{ steps.vercel_preview.outcome }}" "${{ steps.vercel_preview.outputs.deploymentUrl }}"

  Deploy-Production:
    name: Deploy Production
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && needs.paths.outputs.deployable == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - build
      - Deploy-Preview
      - paths
    environment:
      name: Production
      url: ${{ steps.vercel_production.outputs.deploymentUrl }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Pull Vercel Environment Variables for Production
        run: pnpm dlx vercel@canary pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (Production)
        id: vercel_production
        run: bash ./.github/scripts/deploy/vercel-deploy.sh production

      - name: Generate deployment summary
        if: always()
        run: bash ./.github/scripts/deploy/write-production-summary.sh "${{ steps.vercel_production.outcome }}" "${{ steps.vercel_production.outputs.deploymentUrl }}"
